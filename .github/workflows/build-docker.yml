name: build-docker

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load local for smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: monitoramento-claude:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container start
        run: |
          docker run -d --name mon -p 9000:9000 monitoramento-claude:smoke
          for i in {1..20}; do
            if curl -fsS http://localhost:9000/api/state >/dev/null; then
              echo "API pronta"; break
            fi
            sleep 1
          done
          curl -f http://localhost:9000/api/state || (docker logs mon && exit 1)
          docker rm -f mon
